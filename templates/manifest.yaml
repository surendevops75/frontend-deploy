# Frontend Deployment on Kubernetes

# Complete Manifest

# --------------------------------------------------
# CONFIGMAP
# Stores Nginx configuration
# --------------------------------------------------

apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend
  namespace: roboshop

data:

  nginx.conf: |

    # Run Nginx worker processes as nginx user
    user nginx;

    # Automatically determine worker count
    worker_processes auto;

    # Error logs
    error_log /var/log/nginx/error.log notice;

    pid /run/nginx.pid;

    include /usr/share/nginx/modules/*.conf;

    events {

        # Maximum connections per worker
        worker_connections 1024;
    }

    http {

        # Access log format
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        keepalive_timeout 65;

        include /etc/nginx/mime.types;

        default_type application/octet-stream;

        server {

            # Nginx listens on container port 8080
            listen 8080;

            root /usr/share/nginx/html;

            # Catalogue Service
            location /api/catalogue/ {
              proxy_pass http://catalogue:8080/;
            }

            # User Service
            location /api/user/ {
              proxy_pass http://user:8080/;
            }

            # Cart Service
            location /api/cart/ {
              proxy_pass http://cart:8080/;
            }

            # Shipping Service
            location /api/shipping/ {
              proxy_pass http://shipping:8080/;
            }

            # Payment Service
            location /api/payment/ {
              proxy_pass http://payment:8080/;
            }

            # Health Check Endpoint
            location /health {

              stub_status on;

              access_log off;
            }
        }
    }

---

# --------------------------------------------------
# DEPLOYMENT
# Frontend Pod Deployment
# --------------------------------------------------

apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: roboshop

spec:

  replicas: 1

  selector:

    matchLabels:
      project: roboshop
      component: frontend
      tier: frontend

  template:

    metadata:

      labels:
        project: roboshop
        component: frontend
        tier: frontend

    spec:

      containers:

      - name: frontend

        # Image supplied by Helm values
        image: "{{ .Values.deployment.imageRepo }}:{{ .Values.deployment.imageVersion }}"

        imagePullPolicy: Always

        ports:

        - name: liveness-port
          containerPort: 8080

        # Readiness Probe
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port

        # Liveness Probe
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port

        # Mount nginx.conf
        volumeMounts:

          - name: nginx-config
            mountPath: /etc/nginx/nginx.conf
            subPath: nginx.conf

      volumes:

      - name: nginx-config

        configMap:
          name: frontend

---

# --------------------------------------------------
# SERVICE
# Internal Service
# --------------------------------------------------

apiVersion: v1
kind: Service

metadata:
  name: frontend
  namespace: roboshop

spec:

  selector:
    project: roboshop
    component: frontend
    tier: frontend

  ports:

    - protocol: TCP

      # Cluster Service Port
      port: {{ .Values.service.servicePort }}

      # Container Port
      targetPort: 8080

---

# --------------------------------------------------
# TARGET GROUP BINDING
# Connects AWS Target Group
# --------------------------------------------------

apiVersion: elbv2.k8s.aws/v1beta1
kind: TargetGroupBinding

metadata:
  name: frontend
  namespace: roboshop

spec:

  serviceRef:
    name: frontend
    port: 80

  targetGroupARN: {{ .Values.tgb.arn }}

  # Register Pod IPs directly
  targetType: ip